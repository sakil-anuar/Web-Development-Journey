<!DOCTYPE html>
<html>
    <title>Registration Form</title>
    <body>
        <h2>Student Registration Form</h2>

        <form>

            <!--Username-->
            <label>Username:</label>
            <input type="text" name="Username" placeholder="Enter Username" required>
            <br><br>

             <!--Password-->
            <label>Password:</label>
            <input type="password" name="password" placeholder="Enter password" required>
            <br><br>

             <!--Confirm Password-->
            <label>Username:</label>
            <input type="password" name="password" placeholder="Enter confirm password" required>
            <br><br>

             <!--Email-->
            <label>Email:</label>
            <input type="email" name="email" placeholder="Enter email" required>
            <br><br>

             <!--Date of Birth-->
            <label>Date of Birth:</label>
            <input type="date" name="dob" >
            <br><br>

             <!--Gender-->
            <label>Gender:</label>
            <input type="radio" name="gender" value="Male" >Male
            <input type="radio" name="gender" value="Female" >Female
            <input type="radio" name="gender" value="other" >Other
            <br><br>

            <!--Drop-Down-->
            <label>Departmet:</label>
            <select name="department">

                <option value="cse">Cse</option>
                <option value="eee">EEE</option>
                <option value="BBA">BBA</option>
                <option value="english">English</option>

            </select>
            <br><br>

            <!--Check-Box-->
            <label>Skills:</label>
            <br>
            <input type="checkbox" name="skill" value="Html">Html
            <input type="checkbox" name="skill" value="Css">Css
            <input type="checkbox" name="skill" value="Javascript">Javascript
            <input type="checkbox" name="skill" value="Python">Python

            <br><br>

            <!--phone-->

            <label>Phone Number:</label>
            <input type="tel" name="phone" placeholder="01xxxxxxxxx">
            <br><br>

            <!--File-Upload-->

            <label>Upload Cv</label>
            <input type="file" name="cv" required>
            <br><br>

            <!--Range-->

            <label>Programing Skill</label>
            <input type="range" min="0" max="100">
            <br><br>

            <!--Color-->

            <label>Favourit Color</label>
            <input type="color">
            <br><br>

            <!--Submit & Reset-->

            <input type="submit" value="Resister">
             <input type="reset" value="Clear">

        </form>
    </body>
</html>
